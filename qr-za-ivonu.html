<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skeniraj za naš sajt 🤍</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%);
      font-family: 'Lato', sans-serif;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: 24px;
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 60px rgba(212, 175, 55, 0.12), 0 8px 24px rgba(0,0,0,0.06);
    }
    .card h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      color: #2c2c2c;
      margin-bottom: 4px;
      letter-spacing: -0.5px;
    }
    .card .sub {
      color: #777;
      font-size: 0.9rem;
      margin-bottom: 24px;
      font-style: italic;
    }
    .card img {
      width: 100%;
      max-width: 320px;
      border-radius: 16px;
      border: 2px solid #f5e6c8;
      box-shadow: 0 8px 30px rgba(212, 175, 55, 0.1);
      margin-bottom: 20px;
    }
    .card .url {
      font-size: 0.8rem;
      color: #d4af37;
      font-weight: 700;
      letter-spacing: 1px;
      word-break: break-all;
    }
    .card .hearts {
      margin-top: 16px;
      font-size: 1.2rem;
      letter-spacing: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ivona &amp; Nikola 🤍</h1>
    <p class="sub">skeniraj da otvoriš naš svet</p>
    <img src="qrcode.png" alt="QR Code">
    <p class="url">zastavaa.github.io/ivona2</p>
    <div class="hearts">🤍 🤍 🤍</div>
  </div>
</body>
</html>
